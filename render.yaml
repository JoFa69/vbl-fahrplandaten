services:
  # Python Backend
  - type: web
    name: vbl-fahrplandaten-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: MOTHERDUCK_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0

  # React Frontend (Static Site)
  - type: web
    name: vbl-fahrplandaten-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist

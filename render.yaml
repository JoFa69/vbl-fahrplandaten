services:
  - type: web
    name: vbl-fahrplandaten-monolith
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: MOTHERDUCK_TOKEN
        sync: false
      - key: VITE_API_BASE_URL
        value: "" # Empty for monolith/relative paths
